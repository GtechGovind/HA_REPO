# ==============================================================================
# Monitoring Client Role
# ==============================================================================
# Description: Installs and configures monitoring agents and logging collectors
#              on client (application/database) nodes.
#              - Installs Promtail for log collection.
#              - Configures log targets for Loki.
# ==============================================================================

- name: Add Grafana repository key
  shell: curl -fsSL https://apt.grafana.com/gpg.key | gpg --dearmor -o /usr/share/keyrings/grafana.gpg
  args:
    creates: /usr/share/keyrings/grafana.gpg

- name: Add Grafana official repository
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/grafana.gpg] https://apt.grafana.com stable main"
    state: present

- name: Install Promtail
  apt:
    name: promtail
    state: present

- name: Force cleanup Promtail configuration for reinstallation
  file:
    path: /etc/promtail/config.yml
    state: absent
  when: infra_reinstall

- name: Configure Promtail
  template:
    src: promtail.yml.j2
    dest: /etc/promtail/config.yml
  notify: restart promtail

- name: Ensure Promtail is started and enabled
  systemd:
    name: promtail
    enabled: yes
    state: started
  register: promtail_service

- name: Debug promtail service status
  debug:
    msg: "Promtail service is running: {{ promtail_service.changed or 'running' in promtail_service.status.ActiveState | default('') }}"
  when: promtail_service is defined and promtail_service.status is defined