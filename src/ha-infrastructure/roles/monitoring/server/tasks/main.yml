# ==============================================================================
# Monitoring Server Configuration Role (Prometheus/Grafana)
# ==============================================================================
# Description: Installs and configures the central monitoring server.
#              - Installs Prometheus for metrics storage.
#              - Installs Grafana for visualization.
#              - Configures alertmanager for notifications.
# ==============================================================================

- name: Add Grafana repository key
  shell: curl -fsSL https://apt.grafana.com/gpg.key | gpg --dearmor -o /usr/share/keyrings/grafana.gpg
  args:
    creates: /usr/share/keyrings/grafana.gpg

- name: Add Grafana official repository
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/grafana.gpg] https://apt.grafana.com stable main"
    state: present

- name: Install monitoring stack packages
  apt:
    name:
      - prometheus
      - prometheus-alertmanager
      - grafana
      - unzip
    state: present

- name: Check if Loki is installed
  stat:
    path: /usr/local/bin/loki
  register: loki_bin

- name: Install Loki
  block:
    - name: Download Loki binary
      get_url:
        url: "https://github.com/grafana/loki/releases/download/v2.9.4/loki-linux-amd64.zip"
        dest: /tmp/loki.zip
        mode: '0644'

    - name: Unarchive Loki binary
      unarchive:
        src: /tmp/loki.zip
        dest: /usr/local/bin/
        remote_src: yes
        mode: '0755'

    - name: Rename Loki binary
      command: mv /usr/local/bin/loki-linux-amd64 /usr/local/bin/loki
      args:
        removes: /usr/local/bin/loki-linux-amd64
  when: not loki_bin.stat.exists

- name: Create Loki user
  user:
    name: loki
    system: yes
    shell: /bin/false

- name: Create Loki directories
  file:
    path: "{{ item }}"
    state: directory
    owner: loki
    group: loki
    mode: '0755'
  loop:
    - /etc/loki
    - /var/lib/loki

- name: Configure Loki
  copy:
    content: |
      auth_enabled: false
      server:
        http_listen_port: {{ monitoring.loki_port }}
      common:
        path_prefix: /var/lib/loki
        storage:
          filesystem:
            chunks_directory: /var/lib/loki/chunks
            rules_directory: /var/lib/loki/rules
        replication_factor: 1
        ring:
          instance_addr: 127.0.0.1
          kvstore:
            store: inmemory
      schema_config:
        configs:
          - from: 2020-10-24
            store: boltdb-shipper
            object_store: filesystem
            schema: v11
            index:
              prefix: index_
              period: 24h
      ruler:
        alertmanager_url: http://localhost:9093
    dest: /etc/loki/loki.yml
    owner: loki
    group: loki
    mode: '0644'
  notify: restart loki

- name: Create Loki systemd service
  copy:
    content: |
      [Unit]
      Description=Loki logging service
      After=network.target

      [Service]
      Type=simple
      User=loki
      Group=loki
      ExecStart=/usr/local/bin/loki -config.file=/etc/loki/loki.yml
      Restart=on-failure

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/loki.service
  notify: restart loki

- name: Force cleanup monitoring configuration for reinstallation
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/prometheus/prometheus.yml
    - /etc/grafana/grafana.ini
    - /etc/grafana/provisioning
  when: infra_reinstall

- name: Force cleanup monitoring data if requested
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /var/lib/prometheus
    - /var/lib/grafana
  when: infra_cleanup_data

- name: Ensure monitoring data directories exist with correct ownership
  file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode | default('0755') }}"
    recurse: yes
  loop:
    - { path: '/var/lib/prometheus', owner: 'prometheus', group: 'prometheus' }
    - { path: '/var/lib/grafana', owner: 'grafana', group: 'grafana' }

- name: Configure Prometheus
  template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
  notify: restart prometheus

- name: Configure Grafana
  template:
    src: grafana.ini.j2
    dest: /etc/grafana/grafana.ini
  notify: restart grafana

- name: Create Grafana provisioning directories
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: grafana
    mode: '0750'
  loop:
    - /etc/grafana/provisioning/datasources
    - /etc/grafana/provisioning/dashboards

- name: Create Grafana dashboard directory
  file:
    path: /var/lib/grafana/dashboards
    state: directory
    owner: grafana
    group: grafana
    mode: '0755'

- name: Configure Grafana datasources
  template:
    src: provisioning/datasources/prometheus.yml.j2
    dest: /etc/grafana/provisioning/datasources/prometheus.yml
  notify: restart grafana

- name: Configure Grafana dashboard providers
  template:
    src: provisioning/dashboards/dashboards-provider.yml.j2
    dest: /etc/grafana/provisioning/dashboards/dashboards-provider.yml
  notify: restart grafana

- name: Deploy preconfigured dashboards
  copy:
    src: dashboards/
    dest: /var/lib/grafana/dashboards/
    owner: grafana
    group: grafana
    mode: '0640'
  notify: restart grafana

- name: Ensure monitoring services are started and enabled
  systemd:
    name: "{{ item }}"
    enabled: yes
    state: started
  loop:
    - prometheus
    - prometheus-alertmanager
    - grafana-server
    - loki
  register: monitoring_services

- name: Debug monitoring services status
  debug:
    msg: "Monitoring service {{ item.item }} is running: {{ item.changed or 'running' in (item.status.ActiveState | default('')) }}"
  loop: "{{ monitoring_services.results }}"
  when: 
    - monitoring_services is defined
    - item.status is defined
