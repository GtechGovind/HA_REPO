# ==============================================================================
# Monitoring Exporters Role
# ==============================================================================
# Description: Installs and configures Prometheus exporters on target nodes.
#              - Node Exporter for system metrics.
#              - PostgreSQL Exporter for database metrics.
#              - Nginx VTS Exporter for load balancer metrics.
# ==============================================================================

- name: Install node-exporter
  apt:
    name: prometheus-node-exporter
    state: present

- name: Force cleanup exporters configuration for reinstallation
  file:
    path: /etc/default/prometheus-postgres-exporter
    state: absent
  when: infra_reinstall and inventory_hostname in groups.get('db_nodes', [])

- name: Install postgres-exporter
  apt:
    name: prometheus-postgres-exporter
    state: present
  when: inventory_hostname in groups.get('db_nodes', [])

- name: Configure postgres-exporter
  template:
    src: postgres_exporter.env.j2
    dest: /etc/default/prometheus-postgres-exporter
  notify: restart postgres-exporter
  when: inventory_hostname in groups.get('db_nodes', [])

- name: Install nginx-exporter
  apt:
    name: prometheus-nginx-exporter
    state: present
  when: inventory_hostname in groups.get('app_nodes', [])
  notify: restart nginx-exporter

- name: Ensure exporters are started and enabled
  systemd:
    name: "{{ item.name }}"
    enabled: yes
    state: started
  loop:
    - name: 'prometheus-node-exporter'
      when: true
    - name: 'prometheus-postgres-exporter'
      when: "{{ inventory_hostname in groups.get('db_nodes', []) }}"
    - name: 'prometheus-nginx-exporter'
      when: "{{ inventory_hostname in groups.get('app_nodes', []) }}"
  when: item.when
  register: exporter_services

- name: Debug exporter services status
  debug:
    msg: "Exporter {{ item.item.name }} is running: {{ item.changed or 'running' in item.status.ActiveState | default('') }}"
  loop: "{{ exporter_services.results }}"
  when:
    - exporter_services is defined
    - item.item.when
    - item.status is defined
