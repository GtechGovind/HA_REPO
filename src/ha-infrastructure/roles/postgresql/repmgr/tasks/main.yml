- name: Configure repmgr
  template:
    src: repmgr.conf.j2
    dest: /etc/postgresql/{{ postgresql.version }}/main/repmgr.conf
  notify: restart postgresql

- name: Create repmgr user and database
  become_user: postgres
  postgresql_user:
    name: repmgr
    password: "{{ vault_repmgr_password }}"
    role_attr_flags: SUPERUSER,LOGIN
  when: postgresql_role == 'primary'

- name: Create repmgr database
  become_user: postgres
  postgresql_db:
    name: repmgr
    owner: repmgr
  when: postgresql_role == 'primary'

- name: Register primary node
  command: repmgr -f /etc/postgresql/{{ postgresql.version }}/main/repmgr.conf primary register
  become_user: postgres
  when: postgresql_role == 'primary'
  ignore_errors: yes
  register: repmgr_primary_reg

- name: Debug repmgr primary registration
  debug:
    var: repmgr_primary_reg.stdout_lines
  when:
    - postgresql_role == 'primary'
    - repmgr_primary_reg is defined

- name: Stop PostgreSQL on standby before cloning
  systemd:
    name: "{{ item }}"
    state: stopped
  loop:
    - postgresql
    - "postgresql@{{ postgresql.version }}-main"
  when: postgresql_role == 'standby'

- name: Clear data directory on standby before cloning
  file:
    path: "{{ postgresql.data_dir }}"
    state: absent
  when: postgresql_role == 'standby'

- name: Clone standby from primary
  command: |
    repmgr -h {{ groups['db_nodes'][0] }} \
    -U repmgr \
    -d repmgr \
    -f /etc/postgresql/{{ postgresql.version }}/main/repmgr.conf \
    standby clone --force
  environment:
    PGPASSWORD: "{{ vault_repmgr_password }}"
  become_user: postgres
  when: postgresql_role == 'standby'
  register: clone_result
  ignore_errors: yes

- name: Debug standby clone result
  debug:
    var: clone_result.stderr_lines
  when:
    - postgresql_role == 'standby'
    - clone_result is defined

- name: Start PostgreSQL on standby after cloning
  systemd:
    name: "postgresql@{{ postgresql.version }}-main"
    state: started
  when: postgresql_role == 'standby'

- name: Register standby node
  command: repmgr -f /etc/postgresql/{{ postgresql.version }}/main/repmgr.conf standby register
  become_user: postgres
  when: postgresql_role == 'standby'
  register: repmgr_standby_reg

- name: Debug repmgr standby registration
  debug:
    var: repmgr_standby_reg.stdout_lines
  when:
    - postgresql_role == 'standby'
    - repmgr_standby_reg is defined

- name: Verify standby health
  become_user: postgres
  command: pg_isready
  register: pg_ready
  changed_when: false
  when: postgresql_role == 'standby'

- name: Debug standby health check
  debug:
    msg: "PostgreSQL standby readiness check: {{ pg_ready.stdout }}"
  when:
    - postgresql_role == 'standby'
    - pg_ready is defined