- name: Configure repmgr
  template:
    src: repmgr.conf.j2
    dest: /etc/postgresql/{{ postgresql.version }}/main/repmgr.conf
  notify: restart postgresql

- name: Create repmgr user and database
  become_user: postgres
  postgresql_user:
    name: repmgr
    password: "{{ vault_repmgr_password }}"
    role_attr_flags: SUPERUSER,LOGIN
  when: postgresql_role == 'primary'

- name: Create repmgr database
  become_user: postgres
  postgresql_db:
    name: repmgr
    owner: repmgr
  when: postgresql_role == 'primary'

- name: Register primary node
  command: repmgr -f /etc/postgresql/{{ postgresql.version }}/main/repmgr.conf primary register
  become_user: postgres
  when: postgresql_role == 'primary'
  ignore_errors: yes

- name: Stop PostgreSQL on standby before cloning
  systemd:
    name: postgresql
    state: stopped
  when: postgresql_role == 'standby'

- name: Clear data directory on standby before cloning
  file:
    path: "{{ postgresql.data_dir }}"
    state: absent
  when: postgresql_role == 'standby'

- name: Clone standby from primary
  command: |
    repmgr -h {{ groups['db_nodes'][0] }} \
    -U repmgr \
    -d repmgr \
    -f /etc/postgresql/{{ postgresql.version }}/main/repmgr.conf \
    standby clone
  become_user: postgres
  when: postgresql_role == 'standby'
  ignore_errors: yes

- name: Start PostgreSQL on standby after cloning
  systemd:
    name: postgresql
    state: started
  when: postgresql_role == 'standby'

- name: Register standby node
  command: repmgr -f /etc/postgresql/{{ postgresql.version }}/main/repmgr.conf standby register
  become_user: postgres
  when: postgresql_role == 'standby'

- name: Verify standby health
  become_user: postgres
  command: pg_isready
  register: pg_ready
  changed_when: false
  when: postgresql_role == 'standby'