# ==============================================================================
# PostgreSQL Witness Role Configuration
# ==============================================================================
# Description: Configures a witness node for the PostgreSQL cluster.
#              A witness node is used by repmgr to provide a tie-breaker in 
#              failover situations where a majority cannot be reached.
# ==============================================================================

- name: Install PostgreSQL and repmgr on witness
  apt:
    name:
      - postgresql-{{ postgresql.version }}
      - postgresql-{{ postgresql.version }}-repmgr
    state: present

- name: Force cleanup witness PostgreSQL configuration for reinstallation
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/etc/postgresql/{{ postgresql.version }}/main/repmgr.conf"
    - "/var/lib/postgresql/{{ postgresql.version }}/main"
  when: infra_reinstall or infra_cleanup_data

- name: Create repmgr user and database on witness
  become_user: postgres
  postgresql_user:
    name: repmgr
    password: "{{ vault_repmgr_password }}"
    role_attr_flags: SUPERUSER,LOGIN
  when: witness_for_postgresql | default(false)

- name: Create repmgr database on witness
  become_user: postgres
  postgresql_db:
    name: repmgr
    owner: repmgr
  when: witness_for_postgresql | default(false)

- name: Create repmgr configuration for witness
  template:
    src: ../../repmgr/templates/repmgr.conf.j2
    dest: /etc/postgresql/{{ postgresql.version }}/main/repmgr.conf
  notify:
    - restart postgresql
    - restart repmgrd

- name: Ensure PostgreSQL service is started and enabled
  systemd:
    name: "postgresql@{{ postgresql.version }}-main"
    enabled: yes
    state: started
  register: witness_pg_service

- name: Register witness node
  command: repmgr -f /etc/postgresql/{{ postgresql.version }}/main/repmgr.conf witness register --force
  become_user: postgres
  ignore_errors: yes
  register: repmgr_witness_reg

- name: Debug repmgr witness registration
  debug:
    var: repmgr_witness_reg.stdout_lines
  when: repmgr_witness_reg is defined

- name: Enable repmgrd in default configuration for witness
  lineinfile:
    path: /etc/default/repmgrd
    regexp: '^REPMGRD_ENABLED='
    line: 'REPMGRD_ENABLED=yes'
  when: witness_for_postgresql | default(false)

- name: Ensure repmgrd service is started and enabled on witness
  systemd:
    name: repmgrd
    state: started
    enabled: yes
    daemon_reload: yes
  when: witness_for_postgresql | default(false)

- name: Debug witness PostgreSQL status
  debug:
    msg: "PostgreSQL on witness is running: {{ witness_pg_service.changed or 'running' in witness_pg_service.status.ActiveState | default('') }}"
  when: witness_pg_service is defined and witness_pg_service.status is defined
