# ==============================================================================
# PostgreSQL Base Configuration Role
# ==============================================================================
# Description: Installs and prepares PostgreSQL on all database cluster nodes.
#              - Adds the official PostgreSQL repository and GPG key.
#              - Installs core packages, repmgr for failover, and utilities.
#              - Configures fundamental directories and system-level settings.
#              - Initializes the database on the primary node.
# ==============================================================================

- name: Add PostgreSQL repository key (using gpg)
  shell: curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
  args:
    creates: /usr/share/keyrings/postgresql.gpg

- name: Add PostgreSQL official repository
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
    state: present

- name: Install PostgreSQL packages
  apt:
    name:
      - postgresql-{{ postgresql.version }}
      - postgresql-contrib-{{ postgresql.version }}
      - postgresql-{{ postgresql.version }}-repmgr
      - pgbackrest
      - postgresql-{{ postgresql.version }}-wal2json
    state: present

- name: Create PostgreSQL basic directories
  file:
    path: "{{ item }}"
    state: directory
    owner: postgres
    group: postgres
    mode: '0750'
  loop:
    - /var/log/postgresql

- name: Check if default PostgreSQL cluster exists
  shell: pg_lsclusters --no-header | grep -q "{{ postgresql.version }} .*main"
  register: pg_clusters_check
  changed_when: false
  failed_when: false

- name: Stop PostgreSQL before dropping cluster
  systemd:
    name: postgresql
    state: stopped
  when: pg_clusters_check.rc == 0
  ignore_errors: yes

- name: Drop default PostgreSQL cluster to avoid conflicts
  command: pg_dropcluster {{ postgresql.version }} main --stop
  when: pg_clusters_check.rc == 0
  ignore_errors: yes

- name: Remove stale PostgreSQL configuration directory if it exists
  file:
    path: "/etc/postgresql/{{ postgresql.version }}/main"
    state: absent
  when: 
    - postgresql_role == 'primary'
    - pg_clusters_check.rc == 0

- name: Remove stale PostgreSQL data directory if it exists
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ postgresql.data_dir }}"
    - "{{ postgresql.wal_dir }}"
  when: 
    - postgresql_role == 'primary'
    - pg_clusters_check.rc == 0

- name: Create PostgreSQL configuration directory
  file:
    path: "{{ item }}"
    state: directory
    owner: postgres
    group: postgres
    mode: '0755'
  loop:
    - "/etc/postgresql/{{ postgresql.version }}/main"
    - "/etc/postgresql/{{ postgresql.version }}/main/conf.d"
  when: postgresql_role == 'primary'

- name: Create PostgreSQL data and wal directories
  file:
    path: "{{ item }}"
    state: directory
    owner: postgres
    group: postgres
    mode: '0700'
  loop:
    - "{{ postgresql.data_dir }}"
    - "{{ postgresql.wal_dir }}"
  when: postgresql_role == 'primary'

- name: Initialize PostgreSQL data directory
  command: |
    pg_createcluster {{ postgresql.version }} main \
    --start-conf=auto \
    -d {{ postgresql.data_dir }} \
    -- --waldir={{ postgresql.wal_dir }}
  args:
    creates: "{{ postgresql.data_dir }}/PG_VERSION"
  when: postgresql_role == 'primary'

- name: Configure PostgreSQL
  template:
    src: postgresql.conf.j2
    dest: /etc/postgresql/{{ postgresql.version }}/main/postgresql.conf
    owner: postgres
    group: postgres
    mode: '0644'
  notify: restart postgresql

- name: Configure pg_hba.conf
  template:
    src: pg_hba.conf.j2
    dest: /etc/postgresql/{{ postgresql.version }}/main/pg_hba.conf
    owner: postgres
    group: postgres
    mode: '0640'
  notify: restart postgresql

- name: Ensure PostgreSQL service is started and enabled
  systemd:
    name: postgresql
    enabled: yes
    state: started
  when: postgresql_role == 'primary'

- name: Create replication user
  become_user: postgres
  postgresql_user:
    name: "{{ postgresql.replication_user }}"
    password: "{{ vault_replication_password }}"
    role_attr_flags: REPLICATION,LOGIN
    state: present
  when: postgresql_role == 'primary'