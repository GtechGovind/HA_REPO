# ==============================================================================
# Common Infrastructure Setup Role
# ==============================================================================
# Description: Performs baseline configuration for all nodes in the infrastructure.
#              - Updates package cache and installs essential utilities.
#              - Configures time synchronization (Chrony).
#              - Sets system limits and kernel parameters (sysctl).
#              - Implements SSH hardening and Firewall (UFW) rules.
#              - Sets up fail2ban and baseline directory structure.
# ==============================================================================

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install base packages
  apt:
    name:
      - wget
      - curl
      - vim
      - htop
      - net-tools
      - rsync
      - unzip
      - jq
      - git
      - ufw
      - fail2ban
      - auditd
      - chrony
      - python3-pip
      - python3-psycopg2
      - ca-certificates
      - software-properties-common
    state: present

- name: Configure time synchronization
  template:
    src: chrony.conf.j2
    dest: /etc/chrony/chrony.conf
  notify: restart chrony

- name: Ensure hosts are resolvable via /etc/hosts
  lineinfile:
    path: /etc/hosts
    line: "{{ hostvars[item].ansible_host }} {{ item }}"
    regexp: ".* {{ item }}$"
    state: present
  loop: "{{ groups['all'] }}"
  when: hostvars[item].ansible_host is defined

- name: Configure system limits
  template:
    src: limits.conf.j2
    dest: /etc/security/limits.d/99-ha-infra.conf
  notify: restart affected services

- name: Configure kernel parameters
  sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    reload: yes
  loop:
    - { name: net.core.somaxconn, value: 65535 }
    - { name: net.ipv4.tcp_max_syn_backlog, value: 65535 }
    - { name: net.ipv4.ip_local_port_range, value: "1024 65535" }
    - { name: vm.swappiness, value: 10 }
    - { name: vm.vfs_cache_pressure, value: 50 }
  register: sysctl_config

- name: Debug kernel parameter application
  debug:
    msg: "Kernel parameter {{ item.item.name }} set to {{ item.item.value }}"
  loop: "{{ sysctl_config.results }}"
  when: item.changed

- name: Configure SSH hardening
  template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
  notify: restart sshd

- name: Configure firewall
  ufw:
    rule: "{{ item.rule | default('allow') }}"
    port: "{{ item.port }}"
    proto: "{{ item.proto | default('tcp') }}"
    comment: "HA-INFRA: {{ item.comment | default('Unnamed Rule') }}"
  loop: "{{ security.allowed_ports }}"
  when: security.firewall_enabled

- name: Ensure SSH is always allowed before enabling firewall
  ufw:
    rule: allow
    port: "{{ security.ssh_port | default('22') }}"
    proto: tcp
    comment: "HA-INFRA: Safety SSH Rule"
  when: security.firewall_enabled

- name: Enable firewall
  ufw:
    state: enabled
    policy: deny
    direction: incoming
  register: firewall_status

- name: Debug firewall status
  debug:
    msg: "Firewall is enabled: {{ firewall_status.changed or 'enabled' in firewall_status.stdout | default('') }}"
  when: firewall_status is defined

- name: Configure fail2ban
  template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
  notify: restart fail2ban

- name: Create HA infrastructure directories
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - /opt/ha-infrastructure
    - /opt/ha-infrastructure/scripts
    - /opt/ha-infrastructure/logs
    - /opt/ha-infrastructure/backups

- name: Force cleanup of HA directories for reinstallation
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /opt/ha-infrastructure/scripts
    - /opt/ha-infrastructure/logs
  when: infra_reinstall

- name: Cleanup HA backups if requested
  file:
    path: /opt/ha-infrastructure/backups
    state: absent
  when: infra_cleanup_data

- name: Re-create cleaned directories
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - /opt/ha-infrastructure/scripts
    - /opt/ha-infrastructure/logs
    - /opt/ha-infrastructure/backups
  when: infra_reinstall or infra_cleanup_data

- name: Copy health check endpoint script
  copy:
    src: ../../../scripts/health-check-endpoint.py
    dest: /opt/ha-infrastructure/scripts/health-check-endpoint.py
    mode: '0755'
    owner: root
    group: root

- name: Copy failover notification script
  copy:
    src: ../../../scripts/failover-notify.sh
    dest: /opt/ha-infrastructure/scripts/failover-notify.sh
    mode: '0755'
    owner: root
    group: root