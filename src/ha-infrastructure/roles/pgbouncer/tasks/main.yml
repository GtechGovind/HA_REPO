# ==============================================================================
# PgBouncer Connection Pooler Role
# ==============================================================================
# Description: Configures PgBouncer for PostgreSQL connection pooling.
#              - Enhances database performance by reusing established connections.
#              - Provides a single point of contact for applications.
#              - Supports high availability and load distribution.
# ==============================================================================

- name: Install PgBouncer
  apt:
    name: pgbouncer
    state: latest
    install_recommends: yes

- name: Ensure pgbouncer user exists
  user:
    name: pgbouncer
    system: yes
    shell: /bin/false
    home: /var/lib/pgbouncer
    create_home: yes

- name: Create pgbouncer directories
  file:
    path: "{{ item }}"
    state: directory
    owner: pgbouncer
    group: pgbouncer
    mode: '0750'
  loop:
    - /var/log/pgbouncer
    - /var/run/pgbouncer

- name: Force cleanup PgBouncer configuration for reinstallation
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/pgbouncer/pgbouncer.ini
    - /etc/pgbouncer/userlist.txt
  when: infra_reinstall

- name: Configure pgbouncer.ini
  template:
    src: pgbouncer.ini.j2
    dest: /etc/pgbouncer/pgbouncer.ini
  notify: restart pgbouncer

- name: Configure user list for PgBouncer
  template:
    src: userlist.txt.j2
    dest: /etc/pgbouncer/userlist.txt
    mode: '0600'
    owner: pgbouncer
  notify: restart pgbouncer

- name: Ensure PgBouncer is started and enabled
  systemd:
    name: pgbouncer
    enabled: yes
    state: started
  register: pgbouncer_service

- name: Debug PgBouncer service status
  debug:
    msg: "PgBouncer service is running: {{ pgbouncer_service.changed or 'running' in pgbouncer_service.status.ActiveState | default('') }}"
  when: pgbouncer_service is defined and pgbouncer_service.status is defined
