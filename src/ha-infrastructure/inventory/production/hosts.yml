# ==============================================================================
# Infrastructure Inventory and Global Variables
# ==============================================================================
# Description: Defines host groups, individual hosts, and their properties.
#              Contains network details, component versions, and configurations.
# ==============================================================================

all:
  children:

    # Application Layer Nodes (Nginx, Keepalived)
    app_nodes:
      hosts:
        app01:
          ansible_host: 10.100.100.10
          ansible_user: atek
          internal_services:
            - { name: "app1", port: 9090, health_path: "/health" }
            - { name: "app2", port: 9091, health_path: "/health" }
          sync_dirs:
            - /var/www/app1
            - /opt/apps/shared
        app02:
          ansible_host: 10.100.100.11
          ansible_user: atek
          internal_services:
            - { name: "app1", port: 9090, health_path: "/health" }
            - { name: "app2", port: 9091, health_path: "/health" }
          sync_dirs:
            - /var/www/app1
            - /opt/apps/shared

    # Database Layer Nodes (PostgreSQL, Repmgr, PgBouncer)
    db_nodes:
      hosts:
        db01:
          ansible_host: 10.100.100.20
          ansible_user: atek
          postgresql_role: primary
          postgresql_id: 1
        db02:
          ansible_host: 10.100.100.21
          ansible_user: atek
          postgresql_role: standby
          postgresql_id: 2

    # Centralized Monitoring Server
    monitoring:
      hosts:
        mon01:
          ansible_host: 10.100.100.30
          ansible_user: atek

    # Witnesses for Database Failover
    witness:
      hosts:
        app01:
          witness_for_postgresql: true