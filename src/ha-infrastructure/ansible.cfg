# ==============================================================================
# Ansible Configuration for High Availability Infrastructure
# ==============================================================================
# Description: This file defines the global configuration for Ansible execution,
#              specifying the inventory path, roles path, and connection defaults.
#
# Documentation: https://docs.ansible.com/ansible/latest/reference_appendices/config.html
# ==============================================================================

[defaults]
inventory = inventory/production/hosts.yml
roles_path = roles
remote_user = atek
host_key_checking = False

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False
